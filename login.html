<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ເຂົ້າສູ່ລະບົບ – Backlist ກວດກ່ອນໂອນ</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(145deg, var(--mint-50) 0%, var(--mint-100) 100%);
    padding: 20px;
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .login-brand {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .login-brand-icon {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--mint-500), var(--mint-600));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    box-shadow: 0 4px 16px rgba(29,158,117,0.25);
  }

  .login-brand-name {
    font-size: 22px;
    font-weight: 800;
    color: var(--mint-700);
    letter-spacing: -0.3px;
  }

  .login-brand-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: -4px;
  }

  .login-card {
    background: #fff;
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    box-shadow: 0 4px 24px rgba(15,110,86,0.10);
    border: 1px solid var(--border-soft);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .login-card h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--mint-700);
    text-align: center;
  }

  .login-error {
    background: var(--coral-100);
    color: var(--coral-700);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .login-error.show {
    display: flex;
  }

  .input-password-wrap {
    position: relative;
  }

  .input-password-wrap input {
    padding-right: 44px;
  }

  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 16px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  .toggle-pw:hover { color: var(--mint-600); }

  .login-footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  .login-footer a {
    color: var(--mint-600);
    font-weight: 600;
  }

  .btn-login {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--mint-500), var(--mint-600));
    color: #fff;
    border: none;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.15s ease;
    position: relative;
  }

  .btn-login:hover { opacity: 0.92; }
  .btn-login:active { transform: scale(0.98); }

  .btn-login.loading {
    opacity: 0.7;
    pointer-events: none;
  }

  .spinner-inline {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="login-brand">
    <div class="login-brand-icon">🛡️</div>
    <div class="login-brand-name">Backlist ກວດກ່ອນໂອນ</div>
    <div class="login-brand-sub">ລວບລວມລາຍຊື່ທີ່ຖືກແຈ້ງວ່າໂກງ</div>
  </div>

  <div class="login-card">
    <h2>ເຂົ້າສູ່ລະບົບ</h2>

    <div class="login-error" id="loginError">
      <span>⚠️</span>
      <span id="loginErrorMsg">ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ</span>
    </div>

    <div class="form-group" style="margin-bottom:0">
      <label for="usernameInput">ຊື່ຜູ້ໃຊ້</label>
      <input type="text" id="usernameInput" placeholder="ໃສ່ຊື່ຜູ້ໃຊ້" autocomplete="username" autofocus>
    </div>

    <div class="form-group" style="margin-bottom:0">
      <label for="passwordInput">ລະຫັດຜ່ານ</label>
      <div class="input-password-wrap">
        <input type="password" id="passwordInput" placeholder="ໃສ່ລະຫັດຜ່ານ" autocomplete="current-password">
        <button type="button" class="toggle-pw" id="togglePw" aria-label="ສະແດງ/ເຊື່ອງລະຫັດຜ່ານ">👁</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn">ເຂົ້າສູ່ລະບົບ</button>
  </div>

  <div class="login-footer">
    ລະຫັດເລີ່ມຕົ້ນ: <strong>admin</strong> / <strong>admin1234</strong>
  </div>

</div>

<script src="auth.js"></script>
<script>
  // ถ้า ເຂົ້າລະບົບແລ້ວ redirect ทันที
  Auth.redirectIfAuthed('index.html');

  const usernameInput = document.getElementById('usernameInput');
  const passwordInput = document.getElementById('passwordInput');
  const loginBtn      = document.getElementById('loginBtn');
  const loginError    = document.getElementById('loginError');
  const loginErrorMsg = document.getElementById('loginErrorMsg');
  const togglePw      = document.getElementById('togglePw');

  togglePw.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    togglePw.textContent = isHidden ? '🙈' : '👁';
  });

  function showError(msg) {
    loginErrorMsg.textContent = msg;
    loginError.classList.add('show');
  }

  function hideError() {
    loginError.classList.remove('show');
  }

  function doLogin() {
    hideError();
    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if (!username || !password) {
      showError('ກະລຸນາໃສ່ຊື່ຜູ້ໃຊ້ ແລະ ລະຫັດຜ່ານ');
      return;
    }

    loginBtn.classList.add('loading');
    loginBtn.innerHTML = '<span class="spinner-inline"></span>ກຳລັງເຂົ້າສູ່ລະບົບ...';

    // จำลอง delay เล็กน้อยให้ดูเป็นธรรมชาติ
    setTimeout(() => {
      const result = Auth.login(username, password);
      if (result.ok) {
        window.location.href = 'index.html';
      } else {
        showError(result.error);
        loginBtn.classList.remove('loading');
        loginBtn.textContent = 'ເຂົ້າສູ່ລະບົບ';
        passwordInput.value = '';
        passwordInput.focus();
      }
    }, 400);
  }

  loginBtn.addEventListener('click', doLogin);
  [usernameInput, passwordInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
</script>

</body>
</html>
